<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: black;
    text-align: center;
    color: white;
    font-family: Arial;
}

.container {
    width: 640px;
    height: 480px;
    margin: auto;
    overflow: hidden;
    border: 2px solid white;
}

img {
    width: 100%;
    height: 100%;
    object-fit: cover;  
}
</style>
</head>

<body>

<h2>Live Camera</h2>

<div class="container">
    <img id="img">
</div>

<script>
setInterval(() => {
    document.getElementById("img").src =
        "frame.jpg?" + new Date().getTime();
}, 100);
</script>

</body>
</html>
